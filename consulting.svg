<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 360" width="1100" height="360" role="img" aria-label="Consulting">
  <title>Consulting</title>
  <defs>
    <radialGradient id="bg-consulting" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a2029"/>
      <stop offset="100%" stop-color="#0e1217"/>
    </radialGradient>
  </defs>
  <rect width="1100" height="360" fill="url(#bg-consulting)"/>

  <!-- concentric orbits -->
  <g fill="none" stroke="#c9a86a">
    <circle cx="550" cy="180" r="158" stroke-opacity="0.18" stroke-width="1"/>
    <circle cx="550" cy="180" r="105" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="3 4"/>
    <circle cx="550" cy="180" r="62" stroke-opacity="0.5" stroke-width="1.2"/>
  </g>

  <!-- hexagon hub -->
  <polygon points="550,150 576,165 576,195 550,210 524,195 524,165" fill="none" stroke="#e0c187" stroke-width="1.5"/>
  <circle cx="550" cy="180" r="3" fill="#e0c187"/>

  <!-- spokes -->
  <g stroke="#c9a86a" stroke-width="1.1">
    <line x1="550" y1="180" x2="220" y2="95" stroke-opacity="0.6"/>
    <line x1="550" y1="180" x2="180" y2="220" stroke-opacity="0.55"/>
    <line x1="550" y1="180" x2="290" y2="295" stroke-opacity="0.45" stroke-dasharray="3 4"/>
    <line x1="550" y1="180" x2="340" y2="58" stroke-opacity="0.4" stroke-dasharray="3 4"/>
    <line x1="550" y1="180" x2="870" y2="85" stroke-opacity="0.55"/>
    <line x1="550" y1="180" x2="900" y2="248" stroke-opacity="0.6"/>
    <line x1="550" y1="180" x2="975" y2="170" stroke-opacity="0.5"/>
    <line x1="550" y1="180" x2="785" y2="315" stroke-opacity="0.4" stroke-dasharray="3 4"/>
    <line x1="550" y1="180" x2="720" y2="50" stroke-opacity="0.4" stroke-dasharray="3 4"/>
  </g>

  <!-- nodes -->
  <g fill="#0e1217" stroke="#c9a86a" stroke-width="1.5">
    <circle cx="220" cy="95" r="7"/>
    <circle cx="180" cy="220" r="9"/>
    <circle cx="290" cy="295" r="5"/>
    <circle cx="340" cy="58" r="6"/>
    <circle cx="870" cy="85" r="8"/>
    <circle cx="900" cy="248" r="6"/>
    <circle cx="975" cy="170" r="10"/>
    <circle cx="785" cy="315" r="5"/>
    <circle cx="720" cy="50" r="6"/>
  </g>

  <!-- highlight key nodes with filled centers -->
  <g fill="#e0c187">
    <circle cx="180" cy="220" r="3"/>
    <circle cx="975" cy="170" r="4"/>
    <circle cx="870" cy="85" r="2.5"/>
  </g>

</svg>
